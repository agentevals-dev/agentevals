name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.1.0)'
        required: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Verify tag matches pyproject.toml version
        run: |
          REF=${{ github.event.inputs.tag || github.ref_name }}
          TOML_VERSION=$(grep '^version' pyproject.toml | cut -d'"' -f2)
          TAG_VERSION=${REF#v}
          if [ "$TOML_VERSION" != "$TAG_VERSION" ]; then
            echo "Error: $REF does not match pyproject.toml version $TOML_VERSION"
            exit 1
          fi
          echo "RELEASE_TAG=$REF" >> $GITHUB_ENV

      - name: Build core and bundled wheels
        run: make release

      - uses: actions/upload-artifact@v7
        with:
          name: wheels
          path: |
            dist/core/*.whl
            dist/bundle/*.whl

  github-release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v8
        with:
          name: wheels
          path: dist/

      - uses: softprops/action-gh-release@v2.5.0
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: dist/**/*.whl
          generate_release_notes: true


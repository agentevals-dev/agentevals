apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "agentevals.fullname" . }}
  namespace: {{ include "agentevals.namespace" . }}
  labels:
    {{- include "agentevals.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "agentevals.app.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "agentevals.app.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      serviceAccountName: {{ include "agentevals.serviceAccountName" . }}
      {{- if .Values.ephemeralVolume.enabled }}
      volumes:
        - name: agentevals-tmp
          {{- if or .Values.ephemeralVolume.sizeLimit (eq .Values.ephemeralVolume.medium "Memory") }}
          emptyDir:
            {{- if eq .Values.ephemeralVolume.medium "Memory" }}
            medium: Memory
            {{- end }}
            {{- with .Values.ephemeralVolume.sizeLimit }}
            sizeLimit: {{ . }}
            {{- end }}
          {{- else }}
          emptyDir: {}
          {{- end }}
      {{- end }}
      containers:
        - name: agentevals
          image: {{ include "agentevals.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy | default .Values.imagePullPolicy }}
          {{- if .Values.command }}
          command:
            {{- toYaml .Values.command | nindent 12 }}
          {{- end }}
          {{- if .Values.args }}
          args:
            {{- toYaml .Values.args | nindent 12 }}
          {{- end }}
          env:
            - name: AGENTEVALS_SERVER_URL
              value: "http://127.0.0.1:{{ .Values.service.http.containerPort }}"
            {{- if .Values.ephemeralVolume.enabled }}
            - name: TMPDIR
              value: "/tmp"
            - name: HOME
              value: "/tmp/agentevals-home"
            {{- end }}
            {{- if eq .Values.storage.backend "postgres" }}
            - name: AGENTEVALS_STORAGE_BACKEND
              value: "postgres"
            - name: AGENTEVALS_DATABASE_SCHEMA
              value: {{ .Values.database.postgres.schema | quote }}
            {{- if .Values.database.postgres.urlFile }}
            - name: AGENTEVALS_DATABASE_URL_FILE
              value: {{ .Values.database.postgres.urlFile | quote }}
            {{- else if .Values.database.postgres.url }}
            - name: AGENTEVALS_DATABASE_URL
              value: {{ .Values.database.postgres.url | quote }}
            {{- else if .Values.database.postgres.bundled.enabled }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "agentevals.passwordSecretName" . }}
                  key: POSTGRES_PASSWORD
            - name: AGENTEVALS_DATABASE_URL
              value: {{ printf "postgresql://agentevals:$(POSTGRES_PASSWORD)@%s.%s.svc.cluster.local:5432/agentevals?sslmode=disable" (include "agentevals.postgresqlServiceName" .) (include "agentevals.namespace" .) | quote }}
            {{- else }}
            {{ fail "storage.backend=postgres requires database.postgres.url, database.postgres.urlFile, or database.postgres.bundled.enabled=true" }}
            {{- end }}
            {{- end }}
            {{- with .Values.env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.envFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.service.http.containerPort }}
              protocol: TCP
            - name: otlp-http
              containerPort: {{ .Values.service.otlpHttp.containerPort }}
              protocol: TCP
            - name: otlp-grpc
              containerPort: {{ .Values.service.otlpGrpc.containerPort }}
              protocol: TCP
            - name: mcp
              containerPort: {{ .Values.service.mcp.containerPort }}
              protocol: TCP
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            {{- $sc := deepCopy .Values.securityContext }}
            {{- if not .Values.ephemeralVolume.enabled }}
            {{- $_ := set $sc "readOnlyRootFilesystem" false }}
            {{- end }}
            {{- toYaml $sc | nindent 12 }}
          startupProbe:
            httpGet:
              path: /api/health
              port: http
            failureThreshold: 60
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          {{- if .Values.ephemeralVolume.enabled }}
          volumeMounts:
            - name: agentevals-tmp
              mountPath: /tmp
          {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}

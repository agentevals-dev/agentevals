# ==============================================================================
# Global
# ==============================================================================

# -- Number of replicas. The default in-memory backend has no shared state, so
# scale beyond 1 only when storage.backend is "postgres" (durable runs/results
# in Postgres are safe to share across replicas via SELECT FOR UPDATE SKIP
# LOCKED claim semantics).
replicaCount: 1

# -- Global container image registry (prepended to image.repository)
registry: ghcr.io

# -- Global image tag override (defaults to Chart.appVersion)
tag: ""

# -- Global image pull policy
imagePullPolicy: IfNotPresent

# -- Image pull secrets
imagePullSecrets: []

# -- Override the chart name
nameOverride: ""

# -- Override the full resource name
fullnameOverride: ""

# -- Override the release namespace
namespaceOverride: ""

# ==============================================================================
# Image
# ==============================================================================

image:
  # -- Container image registry (overrides global registry)
  registry: ""
  # -- Container image repository (org/name, without registry prefix)
  repository: agentevals-dev/agentevals
  # -- Container image tag (defaults to global tag, then Chart.appVersion)
  tag: ""
  # -- Container image pull policy (defaults to global imagePullPolicy)
  pullPolicy: ""

# ==============================================================================
# Service Account
# ==============================================================================

serviceAccount:
  # -- Create a ServiceAccount
  create: false
  # -- Automount the service account token
  automount: true
  # -- ServiceAccount annotations
  annotations: {}
  # -- ServiceAccount name override
  name: ""

# ==============================================================================
# Pod
# ==============================================================================

# -- Pod annotations
podAnnotations: {}

# -- Additional pod labels
podLabels: {}

# -- Pod security context
podSecurityContext:
  fsGroup: 1000

# -- Container security context.
# When ephemeralVolume.enabled is true, emptyDir at /tmp keeps the root
# filesystem read-only safely. When ephemeralVolume.enabled is false the chart
# forces readOnlyRootFilesystem to false so /tmp stays writable.
securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000

# ==============================================================================
# Ephemeral Volume
# ==============================================================================

# -- Writable scratch space at /tmp (trace uploads, MCP temp files, streaming
# JSONL). HOME is set to /tmp/agentevals-home so Path.home()/.cache stays
# writable. When disabled the chart sets readOnlyRootFilesystem to false.
ephemeralVolume:
  # -- Enable emptyDir mount at /tmp
  enabled: true
  # -- Size limit for the emptyDir (Kubernetes 1.22+), e.g. "2Gi"
  sizeLimit: ""
  # -- Use "Memory" for tmpfs (faster, counts against memory limits); leave "" for node disk
  medium: ""

# ==============================================================================
# Service
# ==============================================================================

service:
  # -- Service type
  type: ClusterIP
  # -- UI / API HTTP port
  http:
    port: 8001
    containerPort: 8001
  # -- OTLP HTTP receiver port
  otlpHttp:
    port: 4318
    containerPort: 4318
  # -- OTLP gRPC receiver port
  otlpGrpc:
    port: 4317
    containerPort: 4317
  # -- MCP (Streamable HTTP) port
  mcp:
    port: 8080
    containerPort: 8080

# ==============================================================================
# Resources
# ==============================================================================

# -- Container resource requests and limits
resources: {}

# ==============================================================================
# Scheduling
# ==============================================================================

# -- Node selector
nodeSelector: {}

# -- Tolerations
tolerations: []

# -- Affinity rules
affinity: {}

# ==============================================================================
# Overrides
# ==============================================================================

# -- Override the image entrypoint
command: []

# -- Override the image arguments
args: []

# -- Extra environment variables appended to the container env block
env: []

# -- Extra envFrom sources (ConfigMapRef, SecretRef)
envFrom: []

# ==============================================================================
# STORAGE
# ==============================================================================

storage:
  # -- Storage backend. "memory" (default) keeps the developer experience
  # zero-config: nothing persisted, restarts lose in-flight state. "postgres"
  # enables /api/runs and persists runs + results in Postgres.
  backend: memory

# ==============================================================================
# DATABASE CONFIGURATION
# ==============================================================================
# Used only when storage.backend is "postgres". Priority order (first match wins):
#   1. database.postgres.urlFile  -- file-based DSN (workload identity friendly)
#   2. database.postgres.url      -- literal DSN
#   3. database.postgres.bundled  -- chart-bundled Postgres (dev/eval only)
# If none is configured the chart fails to render.

database:
  postgres:
    # -- External Postgres connection string.
    # When set, takes precedence over the bundled instance regardless of
    # database.postgres.bundled.enabled.
    url: ""
    # -- Path to a file containing the connection string. Takes precedence
    # over url when set. Useful for projected workload-identity tokens.
    urlFile: ""
    # -- Postgres schema to use for agentevals tables.
    schema: agentevals
    # -- Bundled Postgres instance for development and evaluation only.
    # Not suitable for production. Deployed when enabled is true and url /
    # urlFile are not set.
    bundled:
      # -- Set to true to deploy a chart-managed Postgres alongside the app.
      # Off by default so the zero-config install stays in-memory.
      enabled: false
      image:
        # -- Bundled Postgres image registry
        registry: docker.io
        # -- Bundled Postgres image repository (org/namespace)
        repository: library
        # -- Bundled Postgres image name
        name: postgres
        # -- Bundled Postgres image tag
        tag: "17"
        # -- Bundled Postgres image pull policy
        pullPolicy: IfNotPresent
      # -- PersistentVolumeClaim size for the bundled Postgres data
      storage: 1Gi
      # -- StorageClass for the PVC. Defaults to the cluster default when empty.
      storageClassName: ""
      # The database name, user, and password are hardcoded for the bundled
      # instance (all: "agentevals"). This is intentional for a dev/eval
      # setup. Switch to an external database for production.
      # -- Resource requests/limits for the bundled Postgres container
      resources:
        requests:
          cpu: 250m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi

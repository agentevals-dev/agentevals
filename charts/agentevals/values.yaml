# Multiple replicas are not supported today: the app is built around a single evaluator
# process (no shared job state or coordination across pods). Keep replicaCount at 1 until
# horizontal scaling is designed and implemented.
replicaCount: 1

image:
  repository: soloio/agentevals
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: false
  automount: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  # With ephemeralVolume.enabled, emptyDir at /tmp keeps the root filesystem read-only safely.
  # If ephemeralVolume.enabled is false, the chart forces readOnlyRootFilesystem to false so /tmp stays writable.
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000

# Writable scratch space at /tmp (trace uploads, MCP temp files, streaming JSONL, etc.).
# HOME points under /tmp so Path.home()/.cache (evaluator resolver) stays writable.
ephemeralVolume:
  enabled: true
  # Kubernetes 1.22+: optional cap, e.g. "2Gi"
  sizeLimit: ""
  # Use "Memory" for tmpfs (faster, counts against memory limits); leave "" for node disk.
  medium: ""

service:
  type: ClusterIP
  uiPort: 8001
  otlpPort: 4318
  mcpPort: 8080

resources: {}

nodeSelector: {}
tolerations: []
affinity: {}

# Override image entrypoint (defaults to bundled agentevals serve ...).
command: []
args: []

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "agentevals-grader-sdk"
version = "0.1.0"
description = "Lightweight SDK for building custom agentevals graders"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/agentevals_grader_sdk"]
